<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070b14">
  <title>Página no encontrada | Fénix Labs</title>
  <meta name="description" content="La página solicitada no existe dentro del proyecto académico Fénix Labs." />

  <link rel="apple-touch-icon" sizes="180x180" href="recursos/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="recursos/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="recursos/icons/favicon-16x16.png">
  <link rel="manifest" href="recursos/icons/site.webmanifest">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <canvas id="particles-canvas" aria-hidden="true"></canvas>
  <div class="scroll-progress" id="scrollProgress"></div>

  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="logo">
        <img src="recursos/logos/fenixlabs-logo.png" alt="Logo de Fénix Labs">
        <span>Fénix Labs</span>
      </a>
    </nav>
  </header>

  <main>
    <section class="error-section section">
      <div class="error-card">
        <span class="error-code">404</span>
        <span class="eyebrow">Ruta no encontrada</span>
        <h1>Esta página no forma parte del <span>proyecto publicado.</span></h1>
        <p>El enlace puede estar incompleto o la página pudo cambiar de ubicación.</p>

        <div class="terminal-box error-terminal">
          <span>&gt; Buscando contenido...</span>
          <span>&gt; Estado: ruta no disponible</span>
          <span class="success">&gt; El resto del sitio sigue funcionando.</span>
        </div>

        <div class="hero-actions">
          <a href="index.html" class="btn btn-primary">Ir al inicio</a>
          <a href="web/pagina principal/Blog.html" class="btn btn-secondary">Explorar el blog</a>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/particles.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
